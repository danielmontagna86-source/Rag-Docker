version: '3.8'

services:
  rag_app:
    build: .
    container_name: rag_app
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      # URL para o seu PC hoje (Uberlândia)
      - OLLAMA_URL=http://host.docker.internal:11434
      # URL para outro PC (basta inverter o comentário)
      # - OLLAMA_URL=http://rag_ollama:11434 
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app

  # Serviço do Ollama (Deixe comentado enquanto usar o Ollama do Windows)
  # rag_ollama:
  #   image: ollama/ollama:latest
  #   container_name: rag_ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

volumes:
  ollama_data: